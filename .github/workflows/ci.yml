name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter web exec prisma validate

      - name: Lint
        run: pnpm --filter web lint

      - name: Unit tests
        run: pnpm --filter web test:unit

      - name: Build
        run: pnpm --filter web build

      - name: Repurpose provider boundary check
        run: pnpm --filter web run repurpose:boundary-check
