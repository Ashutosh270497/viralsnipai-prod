version: "3.9"

# ----------------------------------------------------------------
# LOCAL DEVELOPMENT — PostgreSQL
# ----------------------------------------------------------------
# This Compose file starts a local PostgreSQL instance that matches
# the Prisma schema (provider = "postgresql") for local development.
#
# Production uses Supabase PostgreSQL — see docs/PRODUCTION_SETUP.md.
#
# Usage:
#   docker compose up -d          # start DB
#   docker compose down           # stop DB
#   docker compose down -v        # stop + wipe data
# ----------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clippers
      POSTGRES_PASSWORD: clippers_local
      POSTGRES_DB: clippers
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippers"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
